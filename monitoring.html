<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monitoring — THESIS</title>
  
  <link rel="stylesheet" href="css/Navbar.css" />
  <link rel="stylesheet" href="css/monitoring.css" /> 
  
  <style>
    .text-critical { color: red; font-weight: bold; }
    .text-warning { color: orange; font-weight: bold; }
    .text-healthy { color: green; font-weight: bold; }
    
    .status-banner { padding: 15px; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; border-radius: 5px; margin-bottom: 20px; font-weight: bold; text-align: center; transition: all 0.3s ease; }
    .status-banner.critical { background: #f8d7da; color: #721c24; border-color: #f5c6cb; animation: pulseRed 1s infinite; }
    .status-banner.warning { background: #fff3cd; color: #856404; border-color: #ffeeba; }
    
    .zone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .zone { border: 2px solid #ddd; padding: 20px; text-align: center; font-weight: bold; border-radius: 8px; background: #f9f9f9; transition: 0.3s; }
    .zone.active-warning { background-color: #ffc107 !important; color: #000 !important; border-color: #e0a800 !important; }
    .zone.active-critical { background-color: #dc3545 !important; color: white !important; border-color: #bd2130 !important; animation: blinkZone 1s infinite; box-shadow: 0 0 15px rgba(220, 53, 69, 0.6); }

    @keyframes blinkZone { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    
    .video-wrapper { width: 100%; background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; min-height: 300px; display: flex; justify-content: center; align-items: center; }
    .type-badge { padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; background: #eee; color: #333; font-weight: bold; }
  </style>
</head>
<body>

<header class="topnav">
  <div class="container nav-inner">
    <a class="brand" href="Fpage.html">🐤🐓🐔</a>
    <button id="menuBtn" class="menu-btn">☰</button>
    <nav id="siteNav" class="nav-links">
      <a href="Fpage.html">Home</a>
      <a href="monitoring.html" class="active">Monitoring</a>
      <a href="history.html">History</a>
      <a href="settings.html">Settings</a>
    </nav>
  </div>
</header>

<main class="container">
  <h1>Monitoring Dashboard</h1>

  <div class="video-wrapper">
    <img
      id="liveVideo"
      style="width:100%; height:auto;"
      alt="Live Video Feed"
    >
  </div>
  <p style="font-size:0.9rem;color:#666;margin-top:8px">
    <span style="color:red; animation: blink 1s infinite;">●</span> Live Stream via LocalTunnel
  </p>

  <div class="zone-wrapper" style="margin-top: 20px;">
    <strong>Detected Sound/Movement Location</strong>
    <div class="zone-grid">
      <div class="zone" id="A">A</div> <div class="zone" id="B">B</div> <div class="zone" id="C">C</div>
      <div class="zone" id="D">D</div> <div class="zone" id="E">E</div> <div class="zone" id="F">F</div>
      <div class="zone" id="G">G</div> <div class="zone" id="H">H</div> <div class="zone" id="I">I</div>
    </div>
  </div>

  <div id="farmStatus" class="status-banner" style="margin-top: 20px;">
    Farm Status: Waiting for data...
  </div>

  <table style="width: 100%; margin-top: 15px;">
    <thead>
      <tr>
        <th>Time</th>
        <th>Type</th>
        <th>Zone</th>
        <th>Status</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody id="monitoringBody">
      <tr><td colspan="5" style="text-align:center;color:#888; padding: 20px;">Initializing System...</td></tr>
    </tbody>
  </table>
</main>

<footer class="site-footer">
  <div class="container footer-inner">
    <p>© 🐤🐓🐔 — Research project on Poultry Health Monitoring.</p>
  </div>
</footer>

<script src="js/monitoring.js?version=100"></script>

<script>
  // Permanent URL for Cloudflare Tunnel
  const CF_BASE = "https://live.chickenmonitoring.online";
  const VIDEO_FEED_URL = `${CF_BASE}/video_feed`;
  const imgElement = document.getElementById('liveVideo');

  // Direkta na nating ilalagay ang video, wala ng bypass-bypass!
  function setupVideoFeed() {
    imgElement.src = VIDEO_FEED_URL;
  }

  /**
   * ALERT SYNC: 
   * Kumukuha ng data sa PHP at pinapasa sa Python AI script
   */
  async function syncAlertsToFlask() {
    try {
      const res = await fetch("api/get_monitoring.php", {
        method: "GET",
        credentials: "same-origin",
        cache: "no-store"
      });

      const data = await res.json();

      await fetch(`${CF_BASE}/update_alerts`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      console.log("Alerts synced to Flask via Cloudflare:", data);
    } catch (err) {
      console.error("Alert sync failed:", err);
    }
  }

  // Initial Run
  setupVideoFeed();
  syncAlertsToFlask();
  
  // Auto-sync every 15 seconds
  setInterval(syncAlertsToFlask, 15000);
</script>

</body>
</html>
